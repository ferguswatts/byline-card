<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Install Bias — NZ Journalist Transparency</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #c8c8d0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 40px 40px;
      text-align: center;
    }

    .logo { margin-bottom: 16px; }
    .subtitle {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 64px;
    }

    .headline {
      font-size: 32px;
      font-weight: 400;
      color: #e8e8ec;
      line-height: 1.4;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .subhead {
      font-size: 18px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 56px;
      max-width: 600px;
    }

    /* Install button */
    .install-btn {
      display: inline-block;
      padding: 14px 48px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #fff;
      color: #0f0f1a;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: -0.01em;
    }
    .install-btn:hover { background: #f0f0f0; }
    .install-btn.disabled {
      background: transparent;
      color: #555;
      border-color: #222;
      cursor: default;
    }
    .install-btn.disabled:hover { background: transparent; }

    /* Bottom section */
    .bottom {
      padding: 40px;
      display: flex;
      justify-content: center;
      gap: 48px;
      flex-wrap: wrap;
      border-top: 1px solid #1a1a2e;
    }
    .bottom a {
      color: #555;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.15s;
    }
    .bottom a:hover { color: #999; }

    /* Platform strip */
    .platforms {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
      margin-top: 48px;
    }
    .platforms li a, .platforms li span {
      font-size: 13px;
      color: #444;
      text-decoration: none;
    }
    .platforms li a:hover { color: #888; }

    @media (max-width: 600px) {
      .hero { padding: 60px 24px 32px; }
      .headline { font-size: 24px; }
      .subhead { font-size: 16px; }
      .bottom { gap: 24px; padding: 32px 24px; }
      .platforms { gap: 20px; }
    }
  </style>
</head>
<body>

<div class="hero">
  <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="320" height="74">
    <text font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="100" font-weight="600" y="90">
      <tspan x="20" fill="#fff">B</tspan>
      <tspan fill="#e63946" font-style="italic">I</tspan>
      <tspan fill="#fff">AS</tspan>
    </text>
    <line x1="16" y1="102" x2="313" y2="102" stroke="#e63946" stroke-width="5" stroke-linecap="round"/>
  </svg>
  <div class="subtitle">Media bias scorer</div>

  <h1 class="headline">Bias is human. Transparency is a choice.</h1>
  <p class="subhead">Every journalist has a perspective. Now you can see it before it shapes yours.</p>

  <div id="primary-cta"></div>

  <ul class="platforms">
    <li><a href="#" id="link-chrome">Chrome</a></li>
    <li><a href="#" id="link-firefox">Firefox</a></li>
    <li><span>Safari</span></li>
    <li><span>iOS</span></li>
    <li><a href="https://ferguswatts.github.io/Bias./">Web</a></li>
  </ul>
</div>

<div class="bottom">
  <a href="https://ferguswatts.github.io/Bias./">Dashboard</a>
  <a href="https://github.com/ferguswatts/Bias.">GitHub</a>
  <a href="https://ferguswatts.github.io/Bias./privacy.html">Privacy</a>
  <span style="color:#333">Open source &middot; Zero data collection</span>
</div>

<script>
(function() {
  var CHROME_URL = '#';
  var FIREFOX_URL = '#';

  var ua = navigator.userAgent;
  var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var isFirefox = /Firefox\//.test(ua);
  var isSafari = /Safari\//.test(ua) && !/Chrome\//.test(ua);
  var isChrome = /Chrome\//.test(ua) && !/Edg\//.test(ua) && !/OPR\//.test(ua);
  var isEdge = /Edg\//.test(ua);
  var isAndroid = /Android/.test(ua);

  var label, url, disabled;

  if (isIOS) {
    label = 'Coming soon for iOS'; url = '#'; disabled = true;
  } else if (isFirefox) {
    label = 'Install for Firefox'; url = FIREFOX_URL; disabled = url === '#';
  } else if (isSafari) {
    label = 'Coming soon for Safari'; url = '#'; disabled = true;
  } else if (isChrome || isEdge) {
    label = 'Install for Chrome'; url = CHROME_URL; disabled = url === '#';
  } else if (isAndroid) {
    label = 'Coming soon for Android'; url = '#'; disabled = true;
  } else {
    label = 'Install'; url = '#'; disabled = true;
  }

  var cta = document.getElementById('primary-cta');
  var cls = 'install-btn' + (disabled ? ' disabled' : '');
  if (disabled) {
    cta.innerHTML = '<span class="' + cls + '">' + label + '</span>';
  } else {
    cta.innerHTML = '<a href="' + url + '" class="' + cls + '">' + label + '</a>';
  }

  document.getElementById('link-chrome').href = CHROME_URL;
  document.getElementById('link-firefox').href = FIREFOX_URL;
})();
</script>
</body>
</html>

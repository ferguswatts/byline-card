<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bias — Journalist Transparency</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #c8c8d0;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      display: flex;
    }

    /* Hero panel */
    .hero {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
      transition: width 0.5s ease;
      flex-shrink: 0;
      position: relative;
    }

    .logo { margin-bottom: 16px; }
    .subtitle {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 64px;
    }

    .headline {
      font-size: 32px;
      font-weight: 400;
      color: #e8e8ec;
      line-height: 1.4;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .subhead {
      font-size: 18px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 40px;
      max-width: 600px;
    }

    /* Explore CTA */
    .explore-btn {
      display: inline-block;
      padding: 12px 32px;
      border: 1px solid #e63946;
      border-radius: 6px;
      background: transparent;
      color: #e63946;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: -0.01em;
      margin-bottom: 24px;
    }
    .explore-btn:hover { background: #e63946; color: #fff; }

    /* Install button */
    .install-btn {
      display: inline-block;
      padding: 14px 48px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #fff;
      color: #0f0f1a;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: -0.01em;
    }
    .install-btn:hover { background: #f0f0f0; }
    .install-btn.disabled {
      background: transparent;
      color: #555;
      border-color: #222;
      cursor: default;
    }
    .install-btn.disabled:hover { background: transparent; }

    .cta-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    /* Platform strip */
    .platforms {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
      margin-top: 48px;
    }
    .platforms li a, .platforms li span {
      font-size: 13px;
      color: #444;
      text-decoration: none;
    }
    .platforms li a:hover { color: #888; }

    /* Footer */
    .footer-links {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .footer-links a, .footer-links span {
      color: #333;
      text-decoration: none;
      font-size: 12px;
    }
    .footer-links a:hover { color: #666; }

    .demo-btn {
      display: inline-block;
      padding: 10px 28px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #666;
      font-size: 14px;
      font-weight: 400;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
      letter-spacing: -0.01em;
    }
    .demo-btn:hover { color: #999; }

    /* Right panel (shared by dashboard and video) */
    .right-panel {
      width: 0;
      height: 100vh;
      overflow: hidden;
      transition: width 0.5s ease;
      position: relative;
      flex-shrink: 0;
      border-left: 1px solid #1a1a2e;
    }
    .right-panel iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .right-panel video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: top;
      background: #0f0f1a;
    }
    .panel-close {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #999;
      font-size: 16px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .panel-close:hover { background: #2a2a3e; color: #fff; }

    /* Split active state */
    body.split-active .hero { width: 50%; overflow: hidden; }
    body.split-active .right-panel { width: 50%; }
    body.split-active .panel-close { display: flex; }
    body.split-active .headline { font-size: 22px; }
    body.split-active .subhead { font-size: 14px; margin-bottom: 24px; }
    body.split-active .subtitle { margin-bottom: 32px; }
    body.split-active .logo { width: 220px; height: auto; }
    body.split-active .platforms { margin-top: 24px; }
    body.split-active .explore-btn { font-size: 13px; padding: 10px 24px; }
    body.split-active .install-btn { font-size: 14px; padding: 12px 32px; }
    body.split-active .cta-group { gap: 12px; }

    @media (max-width: 768px) {
      .hero { padding: 60px 24px 80px; }
      .headline { font-size: 24px; }
      .subhead { font-size: 16px; }
      .platforms { gap: 20px; }
    }
  </style>
</head>
<body>

<div class="hero" id="hero">
  <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 115" width="330" height="115">
    <text font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="100" font-weight="600" y="90">
      <tspan x="20" fill="#fff">B</tspan>
      <tspan fill="#e63946" font-style="italic">I</tspan>
      <tspan fill="#fff">AS</tspan>
    </text>
    <line x1="16" y1="102" x2="313" y2="102" stroke="#e63946" stroke-width="5" stroke-linecap="round"/>
  </svg>
  <div class="subtitle"></div>

  <h1 class="headline">Bias is human. Transparency is a choice.</h1>
  <p class="subhead">Every journalist has a perspective. Now you can see theirs before it shapes yours.</p>

  <div class="cta-group">
    <a href="index.html" class="explore-btn" id="explore-btn">Explore journalist bias →</a>
    <a href="#" class="demo-btn" id="demo-btn">See it in action →</a>
    <div id="primary-cta"></div>
  </div>

  <ul class="platforms">
    <li><a href="#" id="link-chrome">Chrome</a></li>
    <li><a href="#" id="link-firefox">Firefox</a></li>
    <li><span>Safari</span></li>
    <li><span>iOS</span></li>
  </ul>

  <div class="footer-links">
    <a href="https://github.com/ferguswatts/Bias.">GitHub</a>
    <a href="privacy.html">Privacy</a>
    <span>Open source · Zero data collection</span>
  </div>
</div>

<div class="right-panel" id="right-panel">
  <button class="panel-close" id="panel-close">✕</button>
</div>

<script>
(function() {
  var CHROME_URL = '#';
  var FIREFOX_URL = '#';

  var ua = navigator.userAgent;
  var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var isFirefox = /Firefox\//.test(ua);
  var isSafari = /Safari\//.test(ua) && !/Chrome\//.test(ua);
  var isChrome = /Chrome\//.test(ua) && !/Edg\//.test(ua) && !/OPR\//.test(ua);
  var isEdge = /Edg\//.test(ua);
  var isAndroid = /Android/.test(ua);

  var label, url, disabled;

  if (isIOS) {
    label = 'Coming soon for iOS'; url = '#'; disabled = true;
  } else if (isFirefox) {
    label = 'Install for Firefox'; url = FIREFOX_URL; disabled = url === '#';
  } else if (isSafari) {
    label = 'Coming soon for Safari'; url = '#'; disabled = true;
  } else if (isChrome || isEdge) {
    label = 'Install for Chrome'; url = CHROME_URL; disabled = url === '#';
  } else if (isAndroid) {
    label = 'Coming soon for Android'; url = '#'; disabled = true;
  } else {
    label = 'Install'; url = '#'; disabled = true;
  }

  var cta = document.getElementById('primary-cta');
  var cls = 'install-btn' + (disabled ? ' disabled' : '');
  if (disabled) {
    cta.innerHTML = '<span class="' + cls + '">' + label + '</span>';
  } else {
    cta.innerHTML = '<a href="' + url + '" class="' + cls + '">' + label + '</a>';
  }

  document.getElementById('link-chrome').href = CHROME_URL;
  document.getElementById('link-firefox').href = FIREFOX_URL;

  // Split-view panels
  var exploreBtn = document.getElementById('explore-btn');
  var demoBtn = document.getElementById('demo-btn');
  var panel = document.getElementById('right-panel');
  var closeBtn = document.getElementById('panel-close');
  var isMobile = window.matchMedia('(max-width: 768px)').matches;

  function openPanel(content) {
    // Clear previous content (except close button)
    var children = panel.children;
    for (var i = children.length - 1; i >= 0; i--) {
      if (children[i] !== closeBtn) panel.removeChild(children[i]);
    }
    panel.appendChild(content);
    document.body.classList.add('split-active');
  }

  function closePanel() {
    document.body.classList.remove('split-active');
  }

  if (!isMobile) {
    exploreBtn.addEventListener('click', function(e) {
      e.preventDefault();
      var iframe = document.createElement('iframe');
      iframe.src = 'index.html';
      openPanel(iframe);
    });

    demoBtn.addEventListener('click', function(e) {
      e.preventDefault();
      var video = document.createElement('video');
      video.src = 'demo.mp4';
      video.autoplay = true;
      video.loop = true;
      video.muted = true;
      video.playsInline = true;
      openPanel(video);
    });

    closeBtn.addEventListener('click', closePanel);
  }
  // On mobile, explore navigates to index.html, demo plays inline
})();
</script>
</body>
</html>
